<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面索引</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    ul { padding-left: 1.25rem; }
    a { color: #2563eb; }
    .loading { color: #6b7280; font-style: italic; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <h1>页面索引</h1>
  <p>下面每个链接对应仓库里一个目录下的 <code>index.html</code>（路径即网址）。</p>
  <ul id="index-list">
    <li class="loading">正在加载页面列表...</li>
  </ul>

  <script type="module">
    import { requireAuth } from './global/auth.js';

    // 1. 检查是否登录，没有登录则弹出登录框
    if (requireAuth()) {
      // 如果已经登录，则加载列表
      loadIndexFiles();
    } else {
      // 监听登录成功事件
      window.addEventListener('auth-success', () => {
        loadIndexFiles();
      });
    }

    async function loadIndexFiles() {
      const listElement = document.getElementById('index-list');
      try {
        const response = await fetch('https://api.github.com/repos/ricky-yoursai/static-pages/git/trees/master?recursive=1');
        if (!response.ok) {
          throw new Error('网络响应错误');
        }
        const data = await response.json();
        
        // 过滤出所有的 index.html 文件
        const indexFiles = data.tree.filter(item => item.type === 'blob' && item.path.endsWith('index.html'));
        
        listElement.innerHTML = ''; // 清空 loading 提示

        if (indexFiles.length === 0) {
          listElement.innerHTML = '<li>没有找到页面。</li>';
          return;
        }

        indexFiles.forEach(file => {
          // 排除根目录的 index.html
          if (file.path === 'index.html') return;

          const li = document.createElement('li');
          const a = document.createElement('a');
          
          // 获取路径，例如 "snaply/index.html" 变成 "/snaply/"
          const dirPath = file.path.replace('index.html', '');
          
          // 将路径转换为更易读的名称 (例如 "global/port/" -> "Global Port")
          const nameParts = dirPath.split('/').filter(Boolean);
          const displayName = nameParts.map(part => part.charAt(0).toUpperCase() + part.slice(1)).join(' ');

          a.href = `/${dirPath}`;
          a.textContent = displayName;
          
          li.appendChild(a);
          li.appendChild(document.createTextNode(` — `));
          
          const code = document.createElement('code');
          code.textContent = file.path;
          li.appendChild(code);
          
          listElement.appendChild(li);
        });
        
      } catch (error) {
        listElement.innerHTML = `<li class="error">加载失败: ${error.message}</li>`;
      }
    }
  </script>
</body>
</html>
